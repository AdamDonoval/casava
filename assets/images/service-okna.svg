<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a7f3d0;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6ee7b7;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>

  <!-- Building wall -->
  <rect x="100" y="60" width="400" height="260" rx="4" fill="#054f38" opacity="0.8"/>

  <!-- Windows -->
  <!-- Left window - dirty -->
  <rect x="130" y="100" width="140" height="180" rx="6" fill="url(#glass)" stroke="#34d399" stroke-width="2"/>
  <line x1="200" y1="100" x2="200" y2="280" stroke="#34d399" stroke-width="2" opacity="0.6"/>
  <line x1="130" y1="190" x2="270" y2="190" stroke="#34d399" stroke-width="2" opacity="0.6"/>
  <!-- Dirt streaks on left window -->
  <g stroke="#065f46" stroke-width="2" opacity="0.5" stroke-linecap="round">
    <line x1="145" y1="110" x2="160" y2="180"/>
    <line x1="170" y1="108" x2="180" y2="150"/>
    <line x1="215" y1="112" x2="225" y2="160"/>
    <line x1="240" y1="108" x2="255" y2="175"/>
  </g>

  <!-- Right window - clean with shine -->
  <rect x="330" y="100" width="140" height="180" rx="6" fill="#6ee7b7" fill-opacity="0.25" stroke="#34d399" stroke-width="2"/>
  <line x1="400" y1="100" x2="400" y2="280" stroke="#34d399" stroke-width="2" opacity="0.6"/>
  <line x1="330" y1="190" x2="470" y2="190" stroke="#34d399" stroke-width="2" opacity="0.6"/>
  <!-- Shine on clean window -->
  <rect x="338" y="108" width="35" height="80" rx="4" fill="white" opacity="0.12" transform="rotate(-10 338 108)"/>
  <rect x="350" y="105" width="15" height="160" rx="4" fill="white" opacity="0.08"/>

  <!-- Squeegee tool -->
  <g transform="translate(285,85) rotate(35)">
    <!-- Handle -->
    <rect x="-6" y="-80" width="12" height="90" rx="6" fill="#e2e8f0"/>
    <!-- Head -->
    <rect x="-22" y="8" width="44" height="14" rx="4" fill="#1e293b"/>
    <!-- Rubber blade -->
    <rect x="-22" y="20" width="44" height="6" rx="2" fill="#0f766e"/>
  </g>

  <!-- Water drips -->
  <g fill="#6ee7b7" opacity="0.7">
    <ellipse cx="290" cy="185" rx="3" ry="8"/>
    <ellipse cx="300" cy="195" rx="2" ry="6"/>
    <ellipse cx="310" cy="180" rx="3" ry="9"/>
    <circle cx="285" cy="198" r="3"/>
    <circle cx="315" cy="192" r="2"/>
  </g>

  <!-- Sparkles on clean window -->
  <g fill="#a7f3d0" opacity="0.9">
    <polygon points="360,130 362,138 370,138 364,143 366,151 360,146 354,151 356,143 350,138 358,138"/>
    <polygon points="430,150 432,156 438,156 433,160 435,166 430,162 425,166 427,160 422,156 428,156" transform="scale(0.7) translate(200,70)"/>
    <circle cx="445" cy="120" r="4"/>
    <circle cx="355" cy="160" r="3"/>
  </g>

  <!-- Label -->
  <text x="300" y="40" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">Umývanie okien</text>
  <text x="300" y="63" font-family="Inter,sans-serif" font-size="13" fill="#a7f3d0" text-anchor="middle" opacity="0.8">Domy · Kancelárie · Výklady</text>
</svg>
