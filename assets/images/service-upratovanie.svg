<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>

  <!-- Office room -->
  <!-- Floor -->
  <rect x="0" y="250" width="600" height="90" fill="#122444" opacity="0.9"/>
  <g stroke="#1d4ed8" stroke-width="1" fill="none" opacity="0.4">
    <line x1="0" y1="275" x2="600" y2="275"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="150" y1="250" x2="150" y2="340"/>
    <line x1="300" y1="250" x2="300" y2="340"/>
    <line x1="450" y1="250" x2="450" y2="340"/>
  </g>

  <!-- Desk -->
  <rect x="300" y="190" width="240" height="20" rx="4" fill="#1e3a8a"/>
  <rect x="310" y="208" width="10" height="50" rx="3" fill="#1e3a8a"/>
  <rect x="520" y="208" width="10" height="50" rx="3" fill="#1e3a8a"/>
  <!-- Monitor -->
  <rect x="370" y="130" width="100" height="65" rx="6" fill="#0f1f3d" stroke="#3b82f6" stroke-width="2"/>
  <rect x="380" y="136" width="80" height="50" rx="3" fill="#1e40af" opacity="0.6"/>
  <!-- Screen glow -->
  <rect x="385" y="140" width="70" height="40" rx="2" fill="#3b82f6" opacity="0.2"/>
  <line x1="420" y1="195" x2="420" y2="210" stroke="#3b82f6" stroke-width="3"/>
  <rect x="405" y="210" width="30" height="4" rx="2" fill="#3b82f6"/>
  <!-- Keyboard -->
  <rect x="350" y="200" width="80" height="14" rx="3" fill="#1e3a8a"/>
  <!-- Coffee mug -->
  <rect x="460" y="175" width="22" height="25" rx="4" fill="#1d4ed8"/>
  <path d="M482,182 Q492,182 492,190 Q492,198 482,198" stroke="#3b82f6" stroke-width="2" fill="none"/>

  <!-- Vacuum cleaner -->
  <g transform="translate(120,140)">
    <rect x="-20" y="40" width="50" height="60" rx="10" fill="#0f2d5f"/>
    <rect x="-15" y="45" width="40" height="25" rx="6" fill="#1d4ed8" opacity="0.8"/>
    <circle cx="10" cy="95" r="8" fill="#0a1628" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="35" cy="100" r="8" fill="#0a1628" stroke="#3b82f6" stroke-width="2"/>
    <!-- Hose -->
    <path d="M10,40 Q30,10 70,-10" stroke="#93c5fd" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Handle/wand -->
    <line x1="70" y1="-10" x2="120" y2="-40" stroke="#bfdbfe" stroke-width="6" stroke-linecap="round"/>
    <!-- Nozzle -->
    <rect x="110" y="-52" width="30" height="14" rx="4" fill="#e2e8f0"/>
  </g>

  <!-- Cleaning spray bottle -->
  <g transform="translate(490,160)">
    <rect x="-10" y="0" width="24" height="55" rx="8" fill="#0369a1"/>
    <rect x="-5" y="-10" width="14" height="14" rx="4" fill="#0284c7"/>
    <path d="M4,-10 Q20,-20 25,-10" stroke="#7dd3fc" stroke-width="2" fill="none"/>
    <!-- Label -->
    <rect x="-7" y="15" width="18" height="22" rx="2" fill="#0ea5e9" opacity="0.6"/>
  </g>

  <!-- Sparkle effects -->
  <g fill="#93c5fd" opacity="0.7">
    <polygon points="240,100 243,112 255,112 245,120 249,132 240,124 231,132 235,120 225,112 237,112"/>
    <circle cx="480" cy="120" r="4"/>
    <circle cx="500" cy="135" r="3"/>
    <circle cx="460" cy="140" r="3"/>
  </g>

  <!-- Label -->
  <text x="300" y="40" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">Pravidelné upratovanie</text>
  <text x="300" y="63" font-family="Inter,sans-serif" font-size="13" fill="#bfdbfe" text-anchor="middle" opacity="0.8">Kancelárie · Bytové domy · Domy</text>
</svg>
