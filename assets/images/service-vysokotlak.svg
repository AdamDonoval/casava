<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a4080"/>
      <stop offset="100%" style="stop-color:#1a6bff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)" rx="0"/>

  <!-- Ground/surface being cleaned -->
  <rect x="0" y="240" width="600" height="100" fill="#06306a" opacity="0.7"/>
  <!-- Dirty side -->
  <rect x="0" y="240" width="250" height="100" fill="#04234f" opacity="0.9"/>
  <!-- Clean line -->
  <line x1="250" y1="240" x2="250" y2="340" stroke="#60a5fa" stroke-width="4" stroke-dasharray="6,4"/>

  <!-- Tiles on ground -->
  <g stroke="#1a5acc" stroke-width="1" fill="none" opacity="0.4">
    <line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="100" y1="240" x2="100" y2="340"/>
    <line x1="200" y1="240" x2="200" y2="340"/>
    <line x1="300" y1="240" x2="300" y2="340"/>
    <line x1="400" y1="240" x2="400" y2="340"/>
    <line x1="500" y1="240" x2="500" y2="340"/>
  </g>
  <!-- Moss/dirt on left side -->
  <g fill="#1a4a20" opacity="0.5">
    <ellipse cx="60" cy="243" rx="30" ry="8"/>
    <ellipse cx="150" cy="243" rx="20" ry="6"/>
    <ellipse cx="30" cy="270" rx="15" ry="5"/>
    <ellipse cx="180" cy="270" rx="25" ry="7"/>
  </g>

  <!-- Pressure washer machine -->
  <rect x="60" y="140" width="80" height="100" rx="10" fill="#0f2d5e"/>
  <rect x="65" y="145" width="70" height="40" rx="6" fill="#1a6bff" opacity="0.7"/>
  <circle cx="100" cy="200" r="20" fill="#0a1e45" stroke="#1a6bff" stroke-width="2"/>
  <circle cx="100" cy="200" r="10" fill="#1a6bff"/>
  <!-- Wheels -->
  <circle cx="75" cy="240" r="10" fill="#0a1e45" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="125" cy="240" r="10" fill="#0a1e45" stroke="#60a5fa" stroke-width="2"/>

  <!-- Hose -->
  <path d="M140,180 Q200,160 240,190" stroke="#60a5fa" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Wand / gun -->
  <g transform="translate(240,180) rotate(-35)">
    <rect x="0" y="-6" width="100" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="95" y="-3" width="30" height="6" rx="3" fill="#94a3b8"/>
    <rect x="-10" y="-15" width="20" height="30" rx="4" fill="#cbd5e1"/>
  </g>

  <!-- Water spray fan -->
  <g opacity="0.75" transform="translate(310,148)">
    <line x1="0" y1="0" x2="80" y2="-30" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="90" y2="-10" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="85" y2="10" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="75" y2="28" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="60" y2="44" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <!-- droplets -->
    <circle cx="85" cy="-28" r="3" fill="#bfdbfe"/>
    <circle cx="95" cy="-8" r="3" fill="#bfdbfe"/>
    <circle cx="90" cy="12" r="3" fill="#bfdbfe"/>
    <circle cx="80" cy="30" r="3" fill="#bfdbfe"/>
    <circle cx="65" cy="46" r="3" fill="#bfdbfe"/>
  </g>

  <!-- Label -->
  <text x="300" y="50" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">Vysokotlakové čistenie</text>
  <text x="300" y="76" font-family="Inter,sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" opacity="0.8">Terasy · Fasády · Chodníky · Parkoviská</text>

  <!-- Shine overlay -->
  <rect x="0" y="0" width="600" height="340" fill="url(#bg)" opacity="0.1" rx="0"/>
</svg>
